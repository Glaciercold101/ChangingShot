<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>ChangingShot - Desktop Monitor</title>\n    <link rel=\"stylesheet\" href=\"styles.css\">\n</head>\n<body>\n    <div class=\"app\">\n        <header class=\"header\">\n            <div class=\"title-bar\">\n                <h1>🎯 ChangingShot</h1>\n                <div class=\"controls\">\n                    <button id=\"pinBtn\" class=\"control-btn\" title=\"Pin window\">📌</button>\n                    <button id=\"minimizeBtn\" class=\"control-btn\" title=\"Minimize\">_</button>\n                    <button id=\"closeBtn\" class=\"control-btn\" title=\"Close\">✕</button>\n                </div>\n            </div>\n            <p>Real-time website monitoring</p>\n        </header>\n\n        <main class=\"main\">\n            <div class=\"status-bar\">\n                <span id=\"statusText\">Loading monitored areas...</span>\n                <span id=\"lastUpdate\"></span>\n            </div>\n\n            <div class=\"content\">\n                <div id=\"areasList\" class=\"areas-list\">\n                    <div class=\"loading\">\n                        <div class=\"spinner\"></div>\n                        <p>Loading...</p>\n                    </div>\n                </div>\n            </div>\n\n            <div class=\"refresh-controls\">\n                <button id=\"refreshBtn\" class=\"btn btn-primary\">🔄 Refresh Now</button>\n                <select id=\"refreshInterval\" class=\"select\">\n                    <option value=\"10000\">10 seconds</option>\n                    <option value=\"30000\" selected>30 seconds</option>\n                    <option value=\"60000\">1 minute</option>\n                    <option value=\"300000\">5 minutes</option>\n                </select>\n            </div>\n        </main>\n    </div>\n\n    <script src=\"index.js\"></script>\n</body>\n</html>\n
