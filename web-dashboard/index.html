<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChangingShot - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="container">
                <h1>🎯 ChangingShot Dashboard</h1>
                <p>Manage your monitored website areas</p>
            </div>
        </header>

        <main class="main">
            <div class="container">
                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="statAreas">0</div>
                        <div class="stat-label">Monitored Areas</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statLastUpdate">-</div>
                        <div class="stat-label">Last Update</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statRefreshRate">30s</div>
                        <div class="stat-label">Refresh Rate</div>
                    </div>
                </div>

                <!-- Settings -->
                <section class="section">
                    <h2>⚙️ Settings</h2>
                    <div class="form-group">
                        <label for="refreshRate">Refresh Interval (seconds):</label>
                        <input type="number" id="refreshRate" min="5" max="300" value="30">
                        <button id="saveSettings" class="btn btn-primary">Save Settings</button>
                    </div>
                </section>

                <!-- Monitored Areas -->
                <section class="section">
                    <h2>📍 Monitored Areas</h2>
                    <div id="areasList" class="areas-container">
                        <div class="loading">Loading areas...</div>
                    </div>
                </section>
            </div>
        </main>

        <footer class="footer">
            <p>ChangingShot v1.0.0 | Monitor website changes with ease</p>
        </footer>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
